<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Car Retailer Database ERD</title>
  <desc id="desc">Entity relationship diagram for the Django models: User, Profile, Product, Orders, OrdersItem, BlogPost, media references, and business-side effects.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#15803d"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #475569; }
      .table { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; filter: url(#shadow); }
      .table-head { fill: #0f172a; }
      .table-head-green { fill: #14532d; }
      .table-head-blue { fill: #1e3a8a; }
      .table-head-orange { fill: #9a3412; }
      .table-head-purple { fill: #581c87; }
      .table-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .table-sub { font: 400 11px Arial, Helvetica, sans-serif; fill: #cbd5e1; }
      .field { font: 400 13px Arial, Helvetica, sans-serif; fill: #334155; }
      .field-strong { font: 700 13px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .note-title { font: 700 15px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .note { font: 400 12px Arial, Helvetica, sans-serif; fill: #475569; }
      .rel { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .rel-green { stroke: #15803d; stroke-width: 2.2; fill: none; marker-end: url(#arrowGreen); }
      .rel-dashed { stroke: #64748b; stroke-width: 1.8; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .rel-label { font: 700 12px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .pill { fill: #e2e8f0; stroke: #cbd5e1; }
      .pill-text { font: 700 11px Arial, Helvetica, sans-serif; fill: #334155; }
      .section { fill: #ffffff; stroke: #dbe4ee; stroke-width: 1.2; filter: url(#shadow); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1200"/>
  <text x="58" y="66" class="title">Database Entity Relationship Diagram</text>
  <text x="58" y="96" class="subtitle">Generated from Django models in backend/accounts, categories, order, and blogs. PostgreSQL is configured through backend/.env.</text>

  <g transform="translate(58 122)">
    <rect x="0" y="0" width="68" height="24" rx="7" class="pill"/>
    <text x="15" y="16" class="pill-text">PK</text>
    <rect x="82" y="0" width="68" height="24" rx="7" class="pill"/>
    <text x="97" y="16" class="pill-text">FK</text>
    <rect x="164" y="0" width="124" height="24" rx="7" class="pill"/>
    <text x="180" y="16" class="pill-text">CASCADE</text>
    <rect x="302" y="0" width="132" height="24" rx="7" class="pill"/>
    <text x="318" y="16" class="pill-text">Media ref</text>
  </g>

  <g id="user-table">
    <rect x="70" y="170" width="370" height="386" rx="10" class="table"/>
    <rect x="70" y="170" width="370" height="66" rx="10" class="table-head-blue"/>
    <path d="M70 226 H440" stroke="#1e3a8a" stroke-width="18"/>
    <text x="94" y="201" class="table-title">accounts.User</text>
    <text x="94" y="220" class="table-sub">extends django.contrib.auth AbstractUser</text>
    <text x="94" y="264" class="field-strong">PK id: BigAutoField</text>
    <text x="94" y="290" class="field">username: CharField(100)</text>
    <text x="94" y="316" class="field">email: EmailField(unique=True)</text>
    <text x="94" y="342" class="field">password: inherited hash</text>
    <text x="94" y="368" class="field">is_staff, is_superuser, is_active</text>
    <text x="94" y="394" class="field">date_joined, last_login</text>
    <text x="94" y="420" class="field">groups, user_permissions</text>
    <text x="94" y="460" class="field-strong">Auth behavior</text>
    <text x="94" y="486" class="field">USERNAME_FIELD = email</text>
    <text x="94" y="512" class="field">JWT claims include profile fields</text>
  </g>

  <g id="profile-table">
    <rect x="520" y="170" width="370" height="318" rx="10" class="table"/>
    <rect x="520" y="170" width="370" height="66" rx="10" class="table-head-green"/>
    <path d="M520 226 H890" stroke="#14532d" stroke-width="18"/>
    <text x="544" y="201" class="table-title">accounts.Profile</text>
    <text x="544" y="220" class="table-sub">customer profile and upload metadata</text>
    <text x="544" y="264" class="field-strong">PK id: BigAutoField</text>
    <text x="544" y="290" class="field-strong">FK user_id: OneToOne User CASCADE</text>
    <text x="544" y="316" class="field">full_name: CharField(1000)</text>
    <text x="544" y="342" class="field">phone: CharField(100)</text>
    <text x="544" y="368" class="field">address: CharField(1000)</text>
    <text x="544" y="394" class="field">job, bio: CharField</text>
    <text x="544" y="420" class="field">image: ImageField(user_images)</text>
    <text x="544" y="446" class="field">verified: BooleanField(default=False)</text>
  </g>

  <g id="product-table">
    <rect x="1010" y="170" width="520" height="446" rx="10" class="table"/>
    <rect x="1010" y="170" width="520" height="66" rx="10" class="table-head-orange"/>
    <path d="M1010 226 H1530" stroke="#9a3412" stroke-width="18"/>
    <text x="1034" y="201" class="table-title">categories.Product</text>
    <text x="1034" y="220" class="table-sub">vehicle catalog, stock, and image metadata</text>
    <text x="1034" y="264" class="field-strong">PK id: BigAutoField</text>
    <text x="1034" y="290" class="field">brand: CharField(100)</text>
    <text x="1034" y="316" class="field">rating: IntegerField</text>
    <text x="1034" y="342" class="field">quantity: IntegerField(default=0)</text>
    <text x="1034" y="368" class="field">carName: CharField(100)</text>
    <text x="1034" y="394" class="field">imgUrl: URLField</text>
    <text x="1034" y="420" class="field">model: CharField(100)</text>
    <text x="1034" y="446" class="field">price: IntegerField</text>
    <text x="1034" y="472" class="field">speed, gps, seatType, automatic</text>
    <text x="1034" y="498" class="field">description: TextField</text>
    <text x="1034" y="538" class="field-strong">Business behavior</text>
    <text x="1034" y="564" class="field">like endpoint increments rating</text>
    <text x="1034" y="590" class="field">find-car maps CLIP image match back to carName</text>
  </g>

  <g id="orders-table">
    <rect x="70" y="650" width="420" height="386" rx="10" class="table"/>
    <rect x="70" y="650" width="420" height="66" rx="10" class="table-head"/>
    <path d="M70 706 H490" stroke="#0f172a" stroke-width="18"/>
    <text x="94" y="681" class="table-title">order.Orders</text>
    <text x="94" y="700" class="table-sub">checkout header and status lifecycle</text>
    <text x="94" y="744" class="field-strong">PK id: BigAutoField</text>
    <text x="94" y="770" class="field-strong">FK user_id: User CASCADE</text>
    <text x="94" y="796" class="field">Firstname, Lastname, email</text>
    <text x="94" y="822" class="field">phoneNumber, address</text>
    <text x="94" y="848" class="field">total_price: DecimalField(10,0)</text>
    <text x="94" y="874" class="field">payment_method: bank, cheque, card, paypal</text>
    <text x="94" y="900" class="field">shipping_deadline: DateField</text>
    <text x="94" y="926" class="field">created_at, updated_at</text>
    <text x="94" y="952" class="field">note: CharField(1000)</text>
    <text x="94" y="978" class="field">status: pending, completed, cancelled</text>
  </g>

  <g id="items-table">
    <rect x="550" y="650" width="400" height="312" rx="10" class="table"/>
    <rect x="550" y="650" width="400" height="66" rx="10" class="table-head-purple"/>
    <path d="M550 706 H950" stroke="#581c87" stroke-width="18"/>
    <text x="574" y="681" class="table-title">order.OrdersItem</text>
    <text x="574" y="700" class="table-sub">line items attached to a checkout</text>
    <text x="574" y="744" class="field-strong">PK id: BigAutoField</text>
    <text x="574" y="770" class="field-strong">FK order_id: Orders CASCADE</text>
    <text x="574" y="796" class="field-strong">FK product_id: Product CASCADE</text>
    <text x="574" y="822" class="field">unit_price: DecimalField(10,0)</text>
    <text x="574" y="848" class="field">color: CharField(20, null=True)</text>
    <text x="574" y="874" class="field">quantity: PositiveIntegerField</text>
    <text x="574" y="900" class="field">total_price: DecimalField(10,0)</text>
    <text x="574" y="936" class="field">save(): copies Product.price and computes total</text>
  </g>

  <g id="blog-table">
    <rect x="1010" y="680" width="520" height="280" rx="10" class="table"/>
    <rect x="1010" y="680" width="520" height="66" rx="10" class="table-head-green"/>
    <path d="M1010 736 H1530" stroke="#14532d" stroke-width="18"/>
    <text x="1034" y="711" class="table-title">blogs.BlogPost</text>
    <text x="1034" y="730" class="table-sub">standalone content entity</text>
    <text x="1034" y="774" class="field-strong">PK id: BigAutoField</text>
    <text x="1034" y="800" class="field">title: CharField(200)</text>
    <text x="1034" y="826" class="field">author: CharField(100)</text>
    <text x="1034" y="852" class="field">date: DateField, time: TimeField</text>
    <text x="1034" y="878" class="field">imgUrl: ImageField(all-images/blog_images)</text>
    <text x="1034" y="904" class="field">description: TextField</text>
    <text x="1034" y="930" class="field">quote: TextField</text>
  </g>

  <g id="media-note">
    <rect x="520" y="520" width="370" height="88" rx="10" class="section"/>
    <text x="544" y="552" class="note-title">frontend/public/media</text>
    <text x="544" y="578" class="note">MEDIA_ROOT points into the Vite public media folder.</text>
    <text x="544" y="598" class="note">Profile.image and BlogPost.imgUrl upload files here; Product.imgUrl stores URLs.</text>
  </g>

  <path class="rel" d="M440 288 H520"/>
  <text x="457" y="274" class="rel-label">1 user</text>
  <text x="470" y="310" class="rel-label">1 profile</text>

  <path class="rel" d="M250 556 C250 596, 280 606, 280 650"/>
  <text x="190" y="610" class="rel-label">1 user</text>
  <text x="296" y="630" class="rel-label">N orders</text>

  <path class="rel" d="M490 786 H550"/>
  <text x="499" y="772" class="rel-label">1 order</text>
  <text x="506" y="808" class="rel-label">N items</text>

  <path class="rel" d="M1010 486 C978 486, 986 796, 950 796"/>
  <text x="952" y="618" class="rel-label">1 product</text>
  <text x="954" y="642" class="rel-label">N order items</text>

  <path class="rel-dashed" d="M702 488 V520"/>
  <path class="rel-dashed" d="M1010 394 C950 394, 920 538, 890 564"/>
  <path class="rel-dashed" d="M1010 878 C950 878, 930 606, 890 582"/>
  <text x="910" y="546" class="rel-label">media references</text>

  <path class="rel-green" d="M730 962 C730 1048, 1180 1050, 1268 616"/>
  <text x="825" y="1080" class="rel-label">checkout decrements Product.quantity; cancel restores it</text>

  <g transform="translate(70 1082)">
    <rect x="0" y="0" width="1460" height="70" rx="10" class="section"/>
    <text x="24" y="28" class="note-title">Important generated and framework tables</text>
    <text x="24" y="52" class="note">Django also creates auth/group/permission tables, session/cache tables, SimpleJWT token blacklist tables, admin log entries, migrations, and third-party app tables where enabled.</text>
  </g>
</svg>
